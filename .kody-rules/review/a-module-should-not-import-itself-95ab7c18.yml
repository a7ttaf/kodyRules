title: A module should not import itself
rule: >-
  Identify cases where a module imports itself. Self-imports are usually unintentional and can cause confusion or unnecessary dependencies. Suggest removing them.
severity: high
scope: file
examples:
  - snippet: "// file: foo.js\nimport foo from './foo'; // Noncompliant\n\nconst foo = require('./foo'); // Noncompliant\n"
    isCorrect: false
  - snippet: "// file: index.js\nimport index from '.'; // Noncompliant\n\nconst index = require('.'); // Noncompliant"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
