title: Add a PodDisruptionBudget for HA Deployments
rule: >-
  For Deployments with replicas ≥ 2, include a PodDisruptionBudget with minAvailable or maxUnavailable set.
severity: low
scope: pull-request
examples:
  - snippet: "kind: PodDisruptionBudget\nspec:\n minAvailable: 2"
    isCorrect: true
  - snippet: "kind: Deployment\nspec:\n replicas: 3"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
