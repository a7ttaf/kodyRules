title: Add comprehensive type hints
rule: >-
  Annotate function parameters and return types; use TypedDict/Protocol/Dataclass/Pydantic where appropriate.
severity: low
scope: file
examples:
  - snippet: "def f(x): ..."
    isCorrect: false
  - snippet: "def f(x: int) -> str: ..."
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
