title: Add database connection decorators
rule: >-
  Provide a decorator/context manager that opens/closes DB sessions and handles commit/rollback automatically.
severity: low
scope: file
examples:
  - snippet: "s = Session(); ...; # no finally"
    isCorrect: false
  - snippet: "with session_scope() as s: ..."
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
