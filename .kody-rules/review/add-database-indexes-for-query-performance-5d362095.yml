title: Add database indexes for query performance
rule: >-
  Identify hot lookups/joins/sorts and add appropriate single/compound indexes in migrations.
severity: low
scope: pull-request
examples:
  - snippet: "WHERE user_id = ?  -- no index"
    isCorrect: false
  - snippet: "CREATE INDEX idx_users_user_id ON users(user_id)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
