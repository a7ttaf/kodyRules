title: Add error handling for external service calls
rule: >-
  Wrap HTTP/SDK calls with timeouts and catch transport/errors; log context and map to domain failures.
severity: high
scope: file
examples:
  - snippet: "requests.post(url, data=payload)"
    isCorrect: false
  - snippet: "requests.post(url, json=payload, timeout=5)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
