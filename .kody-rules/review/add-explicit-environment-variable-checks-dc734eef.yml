title: Add explicit environment variable checks
rule: >-
  Validate required runtime env vars at container start via an entrypoint script; exit with a clear message on missing values.
severity: high
scope: file
examples:
  - snippet: "exec app # no checks"
    isCorrect: false
  - snippet: ": \"${API_KEY:?API_KEY is required}\" && exec app"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
