title: Always Use Braces for Single Statements
rule: >-
  Ensure that all control structures (if, for, while) use braces `{}` even for
  single statements.
severity: high
examples:
  - snippet: if (condition) doSomething();
    isCorrect: false
  - snippet: |-
      if (condition) {
          doSomething();
      }
    isCorrect: true
