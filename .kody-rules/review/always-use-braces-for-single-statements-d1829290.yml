title: Always Use Braces for Single Statements
rule: >-
  Ensure that all control structures (if, for, while) use braces `{}` even for single statements.
severity: high
scope: file
examples:
  - snippet: "if (condition) doSomething();"
    isCorrect: false
  - snippet: "if (condition) {\n    doSomething();\n}"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
