title: Always Use `with` for Managing Resources
rule: >-
  Ensure that resources such as files, sockets, or database connections are
  managed using the `with` statement. Code that explicitly calls `.close()`
  without `with` should be refactored to use context managers for automatic
  resource cleanup.
severity: low
examples:
  - snippet: |-
      file = open('test.txt', 'r')
      data = file.read()
      file.close()
    isCorrect: false
  - snippet: |-
      with open('test.txt', 'r') as file:
          data = file.read()
    isCorrect: true
