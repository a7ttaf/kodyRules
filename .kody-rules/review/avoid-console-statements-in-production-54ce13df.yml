title: Avoid console statements in production
rule: >-
  Ensure that console statements are removed in production code. Console logs can expose sensitive data and impact performance.
severity: low
scope: file
examples:
  - snippet: "var myObj = getData();\nconsole.log(myObj); // bad\nconsole.debug(\"myObj:\", myObj); // bad"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
