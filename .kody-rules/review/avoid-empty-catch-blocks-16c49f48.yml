title: Avoid empty catch blocks
rule: >-
  Ensure that catch blocks do not remain empty. Empty catch blocks hide errors, making debugging difficult. Recommend logging or handling errors properly.
severity: high
scope: file
examples:
  - snippet: "try {\n  doSomething();\n} catch (e) {\n  // Ignored\n}"
    isCorrect: false
  - snippet: "try {\n  doSomething();\n} catch (e) {\n  console.error(\"Error occurred:\", e);\n}\n"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
