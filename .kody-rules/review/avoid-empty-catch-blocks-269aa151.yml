title: Avoid Empty Catch Blocks
rule: >-
  Ensure that catch blocks contain meaningful exception handling logic and do not remain empty.
severity: high
scope: file
examples:
  - snippet: "try {\n    process();\n} catch (IOException e) {}"
    isCorrect: false
  - snippet: "try {\n    process();\n} catch (IOException e) {\n    log.error(\"Error processing\", e);\n}"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
