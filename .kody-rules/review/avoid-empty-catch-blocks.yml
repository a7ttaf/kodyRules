title: Avoid empty catch blocks
rule: >-
  Ensure that catch blocks do not remain empty. Empty catch blocks hide errors,
  making debugging difficult. Recommend logging or handling errors properly.
severity: high
examples:
  - snippet: |-
      try {
        doSomething();
      } catch (e) {
        // Ignored
      }
    isCorrect: false
  - snippet: |
      try {
        doSomething();
      } catch (e) {
        console.error("Error occurred:", e);
      }
    isCorrect: true
