title: Avoid modifying built-in prototypes
rule: >-
  Detect modifications to built-in prototypes. Modifying built-in objects can
  lead to compatibility issues and unexpected behavior. Recommend creating
  helper functions instead.
severity: critical
examples:
  - snippet: |-
      String.prototype.toCustomCase = function () {
        return this.toUpperCase();
      };
    isCorrect: false
  - snippet: |-
      function toCustomCase(value: string): string {
        return value.toUpperCase();
      }
    isCorrect: true
