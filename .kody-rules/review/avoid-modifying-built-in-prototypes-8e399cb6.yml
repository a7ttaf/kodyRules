title: Avoid modifying built-in prototypes
rule: >-
  Detect modifications to built-in prototypes. Modifying built-in objects can lead to compatibility issues and unexpected behavior. Recommend creating helper functions instead.
severity: critical
scope: file
examples:
  - snippet: "String.prototype.toCustomCase = function () {\n  return this.toUpperCase();\n};"
    isCorrect: false
  - snippet: "function toCustomCase(value: string): string {\n  return value.toUpperCase();\n}"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
