title: Avoid modifying input parameters
rule: >-
  Treat function inputs as immutable; copy before mutation (e.g., dict.copy(),
  list(x)).
severity: low
examples:
  - snippet: 'def f(x): x.append(1); return x'
    isCorrect: false
  - snippet: 'def f(xs): ys = list(xs); ys.append(1); return ys'
    isCorrect: true
