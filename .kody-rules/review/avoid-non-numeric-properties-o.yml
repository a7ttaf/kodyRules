title: Avoid Non-Numeric Properties on Arrays
rule: >-
  Ensure that arrays do not contain non-numeric properties. This practice can
  lead to unexpected behavior. Use Maps or Objects instead.
severity: low
examples:
  - snippet: |-
      const arr = [];
      arr['key'] = 'value'; // Bad practice
    isCorrect: false
  - snippet: |-
      const map = new Map<string, string>();
      map.set('key', 'value');
    isCorrect: true
