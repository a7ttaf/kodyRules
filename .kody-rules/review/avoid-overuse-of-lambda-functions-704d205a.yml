title: Avoid Overuse of Lambda Functions
rule: >-
  Identify lambda functions that are too complex. Lambdas should be simple and concise. If a lambda contains multiple expressions, recommend converting it to a titled function for better readability.
severity: low
scope: file
examples:
  - snippet: "items.sort(key=lambda x: x[0] * x[1] - x[2] ** 2)"
    isCorrect: false
  - snippet: "def custom_sort_key(item):\n    return item[0] * item[1] - item[2] ** 2\n\nitems.sort(key=custom_sort_key)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
