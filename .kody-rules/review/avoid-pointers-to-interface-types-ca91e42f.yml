title: Avoid Pointers to Interface Types
rule: >-
  Never use a pointer to an interface type. Pass interfaces as values, since an interface already provides reference semantics to the underlying data.
severity: low
scope: file
examples:
  - snippet: "type Fooer interface { Foo() }\n\nfunc UseFoo(f *Fooer) {\n    // ... using pointer to interface (unnecessary)\n}"
    isCorrect: false
  - snippet: "type Fooer interface { Foo() }\n\nfunc UseFoo(f Fooer) {\n    // ... using interface directly\n}"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
