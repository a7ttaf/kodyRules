title: Avoid Redundant `None` Comparisons
rule: >-
  Identify cases where `x is None` or `x is not None` is used redundantly when `x` is always or never `None`. This may indicate a deeper logic issue.
severity: critical
scope: file
examples:
  - snippet: "def foo():\n    my_var = None\n    if my_var == None:  # Noncompliant: always True.\n        ..."
    isCorrect: false
  - snippet: "def foo(my_var):\n    if my_var == None:\n        ..."
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
