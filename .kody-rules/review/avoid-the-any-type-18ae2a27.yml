title: Avoid the 'any' type
rule: >-
  Detect the use of the 'any' type in TypeScript. Using 'any' disables type checking and can lead to runtime errors. Recommend using specific types or generics instead.
severity: high
scope: file
examples:
  - snippet: "let foo: any = \"bar\";"
    isCorrect: false
  - snippet: "let foo: string = \"bar\";"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
