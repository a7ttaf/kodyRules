title: Avoid unprotected HTTP request redirections
rule: >-
  Check if HTTP request redirections are unvalidated. Allowing arbitrary
  redirections can expose users to phishing attacks. Recommend validating and
  restricting URLs.
severity: critical
examples:
  - snippet: |-
      server.get('/redirect', (request, response) => {

         response.redirect(request.query.url); // Noncompliant
      });
    isCorrect: false
  - snippet: |-
      server.get('/redirect', (request, response) => {

         if (request.query.url.startsWith("https://www.example.com/")) {
            response.redirect(request.query.url);
         }
      });
    isCorrect: true
