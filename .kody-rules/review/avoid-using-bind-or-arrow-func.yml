title: Avoid using .bind() or arrow functions in JSX props
rule: >-
  Detect the use of .bind() or inline arrow functions inside JSX props. These
  create new functions on every render, impacting performance. Suggest moving
  function definitions outside the render method.
severity: high
examples:
  - snippet: |-
      <Component onClick={this._handleClick.bind(this)}></Component>

      <Component onClick={() => handleClick()}></Component>
    isCorrect: false
  - snippet: |-
      function handleClick() {
          //...
      }

      <Component onClick={handleClick}></Component
    isCorrect: true
