title: Avoid using .bind() or arrow functions in JSX props
rule: >-
  Detect the use of .bind() or inline arrow functions inside JSX props. These create new functions on every render, impacting performance. Suggest moving function definitions outside the render method.
severity: high
scope: file
examples:
  - snippet: "<Component onClick={this._handleClick.bind(this)}></Component>\n\n<Component onClick={() => handleClick()}></Component>"
    isCorrect: false
  - snippet: "function handleClick() {\n    //...\n}\n\n<Component onClick={handleClick}></Component"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
