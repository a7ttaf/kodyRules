title: Avoid Using `deleteOnExit()`
rule: >-
  Ensure that `File.deleteOnExit()` is not used, as it can cause memory and resource leaks.
severity: high
scope: file
examples:
  - snippet: "File file = new File(\"file.txt\");\nfile.deleteOnExit();  // Noncompliant"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
