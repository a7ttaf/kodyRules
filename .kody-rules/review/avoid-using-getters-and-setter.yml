title: Avoid using Getters and Setters
rule: >-
  Check for the use of getters and setters. These can introduce unexpected side
  effects and have limited compiler support. Recommend using regular methods
  unless required by a framework.
severity: low
examples:
  - snippet: |-
      class Foo {
        get next() { return this.nextId++; }
      }
    isCorrect: false
