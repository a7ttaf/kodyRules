title: Avoid using the comma operator
rule: >-
  Detect occurrences of the comma operator in expressions. The comma operator
  can make code harder to read and debug, as it executes two expressions but
  only returns the last one. Suggest alternative structures for better
  readability.
severity: high
examples:
  - snippet: 'i = a += 2, a + b;  // Noncompliant: What''s the value of i ?'
    isCorrect: false
  - snippet: >-
      a += 2;

      i = a + b; // We probably expected to assign the result of the addition to
      i, although the previous code wasn't doing it.
    isCorrect: true
