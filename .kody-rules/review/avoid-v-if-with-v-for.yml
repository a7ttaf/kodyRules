title: Avoid `v-if` with `v-for`
rule: Never use `v-if` on the same element as `v-for`.
severity: high
examples:
  - snippet: |-
      <ul>
        <li
          v-for="user in users"
          v-if="user.isActive"
          :key="user.id"
        >
          {{ user.name }}
        </li>
      </ul>
    isCorrect: false
  - snippet: |-
      <ul>
        <li
          v-for="user in activeUsers"
          :key="user.id"
        >
          {{ user.name }}
        </li>
      </ul>
    isCorrect: true
  - snippet: |-
      <ul>
        <template v-for="user in users" :key="user.id">
          <li v-if="user.isActive">
            {{ user.name }}
          </li>
        </template>
      </ul>
    isCorrect: true
