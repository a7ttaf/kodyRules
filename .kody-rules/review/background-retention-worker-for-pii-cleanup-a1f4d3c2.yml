title: Background retention worker for PII cleanup
rule: >-
  Implement a scheduled worker to delete or anonymize records past expires_at, with metrics on deletions and failures. Dry-run mode allowed only in non-prod.
severity: low
scope: file
examples:
  - snippet: "metrics.Count(\"gdpr.retention.deleted\", n);"
    isCorrect: true
  - snippet: "Console.WriteLine(\"deleted some\"); // no metrics"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
