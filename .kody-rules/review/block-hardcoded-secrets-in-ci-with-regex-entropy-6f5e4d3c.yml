title: Block hardcoded secrets in CI with regex & entropy
rule: >-
  Add a CI step that fails builds if secret patterns (JWT, AWS keys) or high-entropy strings are detected in diffs.
severity: high
scope: file
examples:
  - snippet: "gitleaks detect --redact"
    isCorrect: true
  - snippet: "gitleaks detect --no-fail"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
