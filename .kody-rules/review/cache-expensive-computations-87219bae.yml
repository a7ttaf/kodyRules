title: Cache expensive computations
rule: >-
  Apply memoization (functools.lru_cache) or explicit caches for pure, expensive computations keyed by inputs.
severity: low
scope: file
examples:
  - snippet: "compute(x)  # repeated"
    isCorrect: false
  - snippet: "@lru_cache\ndef compute(x): ..."
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
