title: Cache expensive computations
rule: >-
  Apply memoization (functools.lru_cache) or explicit caches for pure, expensive
  computations keyed by inputs.
severity: low
examples:
  - snippet: 'compute(x)  # repeated'
    isCorrect: false
  - snippet: |-
      @lru_cache
      def compute(x): ...
    isCorrect: true
