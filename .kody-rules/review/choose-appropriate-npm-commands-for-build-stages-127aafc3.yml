title: Choose appropriate npm commands for build stages
rule: >-
  Use `npm ci` for reproducible installs in build stages; in runtime, run `npm prune --omit=dev` or install with `--omit=dev`.
severity: low
scope: file
examples:
  - snippet: "RUN npm install"
    isCorrect: false
  - snippet: "RUN npm ci && npm prune --omit=dev"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
