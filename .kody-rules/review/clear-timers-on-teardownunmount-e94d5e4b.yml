title: Clear timers on teardown/unmount
rule: >-
  Whenever you start an interval/timeout, also define a deterministic cleanup path that clears it.
severity: high
scope: file
examples:
  - snippet: "setTimeout(t,500)"
    isCorrect: false
  - snippet: "const id=setTimeout(t,500); clearTimeout(id)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
