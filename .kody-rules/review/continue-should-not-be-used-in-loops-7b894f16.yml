title: Continue should not be used in loops
rule: >-
  Detect the use of 'continue' inside loops. This practice can make control flow harder to follow. Recommend restructuring the loop for better readability.
severity: low
scope: file
examples:
  - snippet: "  for (i = 0; i < 10; i++) {\n    if (i == 5) {\n      continue;  /* Noncompliant */\n    }\n    alert(\"i = \" + i);\n  }"
    isCorrect: false
  - snippet: "  for (i = 0; i < 10; i++) {\n    if (i != 5) {  /* Compliant */\n      alert(\"i = \" + i);\n    }\n  }"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
