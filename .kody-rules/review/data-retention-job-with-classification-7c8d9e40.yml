title: Data retention job with classification
rule: >-
  Run a scheduled job that deletes telemetry after 30 days and anonymizes PII after the retention window; log deletions with data_class and count.
severity: low
scope: file
examples:
  - snippet: "purge({ data_class:'telemetry' })"
    isCorrect: true
  - snippet: "db.deleteAll()"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
