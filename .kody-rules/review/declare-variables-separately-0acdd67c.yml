title: Declare Variables Separately
rule: >-
  Ensure that each variable is declared separately instead of using multiple declarations in one statement.
severity: low
scope: file
examples:
  - snippet: "int a, b, c;"
    isCorrect: false
  - snippet: "int a;\nint b;\nint c;"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
