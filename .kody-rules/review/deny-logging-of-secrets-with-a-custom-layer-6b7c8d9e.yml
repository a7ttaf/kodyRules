title: Deny logging of secrets with a custom layer
rule: >-
  Implement a tracing layer that scans fields and redacts patterns (JWT, API keys, emails) before output.
severity: low
scope: file
examples:
  - snippet: "info!(\"action\"=\"auth.login\", user_id=%uid)"
    isCorrect: true
  - snippet: "println!(\"email={} \", email)"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
