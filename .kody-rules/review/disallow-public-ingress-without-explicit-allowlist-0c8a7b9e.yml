title: Disallow public ingress without explicit allowlist
rule: >-
  For Ingress/Service of type LoadBalancer, require host/path allowlist and TLS; forbid 0.0.0.0/0 exposure without WAF or Auth.
severity: critical
scope: file
examples:
  - snippet: "nginx.ingress.kubernetes.io/whitelist-source-range: 10.0.0.0/8"
    isCorrect: true
  - snippet: "kind: Service\nspec:\n type: LoadBalancer"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
