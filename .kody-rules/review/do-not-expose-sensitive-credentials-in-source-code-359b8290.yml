title: Do Not Expose Sensitive Credentials in Source Code
rule: >-
  Avoid hard‐coding credentials or sensitive information (like DB passwords, API tokens or secret keys) directly in your code. Use separate configuration files or environment variables to manage these values securely.
severity: high
scope: file
examples:
  - snippet: "<?php\n$dbuser = 'admin';\n$dbpass = 'secret123';\n$conn = new PDO('mysql:host=localhost;dbname=test', $dbuser, $dbpass);\n?>"
    isCorrect: false
  - snippet: "<?php\n$dbuser = getenv('DB_USER');\n$dbpass = getenv('DB_PASS');\n$conn = new PDO('mysql:host=localhost;dbname=test', $dbuser, $dbpass);\n?>"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
