title: Do not use the Array constructor
rule: >-
  Detect occurrences of the Array constructor. It behaves inconsistently
  depending on arguments. Recommend using array literals [] instead for clarity
  and predictability.
severity: low
examples:
  - snippet: |-
      const a1 = new Array(x1, x2, x3);
      const a2 = new Array(x1, x2);
      const a3 = new Array(x1);
      const a4 = new Array();
    isCorrect: false
  - snippet: |-
      const a1 = [x1, x2, x3];
      const a2 = [x1, x2];
      const a3 = [x1];
      const a4 = [];
    isCorrect: true
