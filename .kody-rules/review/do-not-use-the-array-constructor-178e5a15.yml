title: Do not use the Array constructor
rule: >-
  Detect occurrences of the Array constructor. It behaves inconsistently depending on arguments. Recommend using array literals [] instead for clarity and predictability.
severity: low
scope: file
examples:
  - snippet: "const a1 = new Array(x1, x2, x3);\nconst a2 = new Array(x1, x2);\nconst a3 = new Array(x1);\nconst a4 = new Array();"
    isCorrect: false
  - snippet: "const a1 = [x1, x2, x3];\nconst a2 = [x1, x2];\nconst a3 = [x1];\nconst a4 = [];"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
