title: Doc comments for packages and exported identifiers
rule: >-
  Every package must have a package comment, and each exported identifier must have a comment starting with the identifier name and a full-sentence summary.
severity: high
scope: file
examples:
  - snippet: "// Parse parses an ISO8601 timestamp.\nfunc Parse(s string) (time.Time, error) { ... }"
    isCorrect: true
  - snippet: "// parses time\nfunc Parse(s string) (time.Time, error) { ... }"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
