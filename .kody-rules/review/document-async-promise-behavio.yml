title: Document async/Promise behavior and errors
rule: >-
  For async functions or functions returning Promise, document resolve value,
  rejection conditions, and usage with await; include @throws or @returns
  {Promise<Type>}.
severity: low
examples:
  - snippet: |-
      /* @returns {Promise<string>} /
      export async function token(){ return 't'; }
    isCorrect: true
  - snippet: |-
      /* @returns {string} /
      export async function token(){ return 't'; }
    isCorrect: false
