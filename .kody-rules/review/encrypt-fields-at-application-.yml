title: Encrypt fields at application layer before persistence
rule: >-
  Use AES-GCM with keys from KMS to encrypt sensitive columns (e.g., SSN) before
  saving; store nonce and auth tag; never rely solely on disk encryption.
severity: high
examples:
  - snippet: crypto.encrypt(ssn)
    isCorrect: true
  - snippet: repo.save(ssn)
    isCorrect: false
