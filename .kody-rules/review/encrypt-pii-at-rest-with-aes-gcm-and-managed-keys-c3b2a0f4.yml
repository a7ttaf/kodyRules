title: Encrypt PII at rest with AES-GCM and managed keys
rule: >-
  For fields like CPF, birth_date, and address, use AES-256-GCM with envelope encryption. Keys must come from a managed KMS; rotate data keys at least annually and store key IDs with the ciphertext.
severity: critical
scope: file
examples:
  - snippet: "Cipher.getInstance(\"AES/GCM/NoPadding\")"
    isCorrect: true
  - snippet: "Cipher.getInstance(\"AES/CBC/PKCS5Padding\") // no auth tag"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
