title: Encrypt secrets at rest with KMS client
rule: >-
  Use a KMS client to derive DEKs and encrypt sensitive blobs; rotate CMKs annually and re-encrypt on rotation.
severity: high
scope: file
examples:
  - snippet: "kms.encrypt(key, data)"
    isCorrect: true
  - snippet: "store(data)"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
