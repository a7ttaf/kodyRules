title: Enforce HTTPS, HSTS, and session policy
rule: >-
  Use Spring Security to require HTTPS, enable HSTS, set session fixation
  protection, and configure SameSite, Secure, HttpOnly cookies.
severity: high
examples:
  - snippet: http.requiresChannel(c->c.anyRequest().requiresSecure())
    isCorrect: true
  - snippet: http.requiresChannel(c->c.anyRequest().requiresInsecure())
    isCorrect: false
