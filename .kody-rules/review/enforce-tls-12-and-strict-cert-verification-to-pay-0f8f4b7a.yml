title: Enforce TLS 1.2+ and strict cert verification to payment gateway
rule: >-
  All outbound connections that may carry CHD/PAN tokens must enforce TLS >= 1.2, validate hostname/chain, and optionally pin gateway SPKI. Disable insecure ciphers/versions. (PCI DSS 4.0 Req. 4)
severity: high
scope: file
examples:
  - snippet: "tls.Config{MinVersion: 0}"
    isCorrect: false
  - snippet: "tls.Config{MinVersion: tls.VersionTLS12}"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
