title: Ensure Functions Use `return` Consistently
rule: >-
  Detect functions that mix `return` statements with values and those without. Inconsistent return usage can lead to unpredictable behavior.
severity: high
scope: file
examples:
  - snippet: "def foo(a): # Noncompliant, function will return \"true\" or None\n  if a == 1:\n    return True\n  return"
    isCorrect: false
  - snippet: "def foo(a):\n  if a == 1:\n    return True\n  return False"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
