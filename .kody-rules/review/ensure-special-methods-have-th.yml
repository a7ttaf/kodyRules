title: Ensure Special Methods Have the Correct Parameters
rule: >-
  Verify that special methods (e.g., `__eq__`, `__len__`) have the correct
  number of parameters. Incorrect parameters can cause runtime errors or
  unexpected behavior.
severity: high
examples:
  - snippet: >-
      class A:
          def __mul__(self, other, unexpected):  # Noncompliant: too many parameters
              return 42

          def __add__(self):  # Noncompliant: missing one parameter
              return 42

      A() * 3  # TypeError: __mul__() missing 1 required positional argument:
      'unexpected'

      A() + 3  # TypeError: __add__() takes 1 positional argument but 2 were
      given
    isCorrect: false
  - snippet: |-
      class A:
          def __mul__(self, other):
              return 42

          def __add__(self, other):
              return 42

      A() * 3
      A() + 3
    isCorrect: true
