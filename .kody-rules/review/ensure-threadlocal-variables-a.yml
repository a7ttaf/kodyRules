title: Ensure `ThreadLocal` Variables Are Properly Cleaned
rule: >-
  Ensure that `ThreadLocal` variables are cleaned using `.remove()` to avoid
  memory leaks.
severity: high
examples:
  - snippet: |-
      public class ThreadLocalUserSession implements UserSession {

        private static final ThreadLocal<UserSession> DELEGATE = new ThreadLocal<>();

        public UserSession get() {
          UserSession session = DELEGATE.get();
          if (session != null) {
            return session;
          }
          throw new UnauthorizedException("User is not authenticated");
        }

        public void set(UserSession session) {
          DELEGATE.set(session);
        }

         public void incorrectCleanup() {
           DELEGATE.set(null); // Noncompliant
         }

        // some other methods without a call to DELEGATE.remove()
      }
    isCorrect: false
  - snippet: |-
      public class ThreadLocalUserSession implements UserSession {

        private static final ThreadLocal<UserSession> DELEGATE = new ThreadLocal<>();

        public UserSession get() {
          UserSession session = DELEGATE.get();
          if (session != null) {
            return session;
          }
          throw new UnauthorizedException("User is not authenticated");
        }

        public void set(UserSession session) {
          DELEGATE.set(session);
        }

        public void unload() {
          DELEGATE.remove(); // Compliant
        }

        // ...
      }
    isCorrect: true
