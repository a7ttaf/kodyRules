title: Explicitly Close Resources in `finally` Blocks
rule: >-
  Check if resources such as files or database connections are properly closed in a `finally` block. This ensures resources are always released, even if an exception occurs.
severity: high
scope: file
examples:
  - snippet: "file = open('test.txt')\ndata = file.read()"
    isCorrect: false
  - snippet: "try:\n    file = open('test.txt')\n    data = file.read()\nfinally:\n    file.close()"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
