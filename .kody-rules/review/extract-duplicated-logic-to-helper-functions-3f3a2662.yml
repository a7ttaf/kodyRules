title: Extract duplicated logic to helper functions
rule: >-
  Move repeated sequences of operations into named helpers or utilities and reuse them.
severity: low
scope: file
examples:
  - snippet: "same expression pasted everywhere"
    isCorrect: false
  - snippet: "def helper(...): ..."
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
