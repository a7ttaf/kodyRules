title: Extract duplicated request validation to helper functions
rule: >-
  For HTTP/RPC handlers, parse+validate inputs in dedicated functions. Return typed errors and reuse across endpoints.
severity: low
scope: file
examples:
  - snippet: "r.FormValue(...) checks repeated in each handler"
    isCorrect: false
  - snippet: "req, err := parseCreateUser(r)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
