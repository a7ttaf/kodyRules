title: Extract hardcoded versions to centralized configuration
rule: >-
  Parameterize tool/runtime versions via ARGs (and CI build args) instead of hardcoding them across multiple Dockerfiles.
severity: low
scope: file
examples:
  - snippet: "ENV PNPM_VERSION=8.15.0 # repeated in many files"
    isCorrect: false
  - snippet: "ARG PNPM_VERSION\nRUN corepack prepare pnpm@${PNPM_VERSION} --activate"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
