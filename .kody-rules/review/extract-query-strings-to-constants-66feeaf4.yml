title: Extract query strings to constants
rule: >-
  Define SQL strings as static final constants or in a repository, not inline across methods.
severity: low
scope: file
examples:
  - snippet: "\"UPDATE t SET...\" scattered"
    isCorrect: false
  - snippet: "static final String SQL = \"UPDATE t SET...\";"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
