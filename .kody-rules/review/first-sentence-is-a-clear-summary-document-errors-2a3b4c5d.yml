title: First sentence is a clear summary; document errors
rule: >-
  The first sentence should be a standalone summary used by godoc. For functions returning error, state error conditions succinctly.
severity: low
scope: file
examples:
  - snippet: "// Open opens the file, returning ErrPermission when not allowed.\nfunc Open(p string) (*os.File, error) { ... }"
    isCorrect: true
  - snippet: "// Open file\nfunc Open(p string) (*os.File, error) { ... }"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
