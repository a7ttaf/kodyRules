title: Fix variable shadowing in nested loops
rule: >-
  Use distinct variable names across scopes; never reuse the outer loop variable
  in inner loops or comprehensions.
severity: low
examples:
  - snippet: '[i for i in items for i in i.children]'
    isCorrect: false
  - snippet: '[(p, c) for p in items for c in p.children]'
    isCorrect: true
