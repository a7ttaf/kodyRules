title: Forbid cross-package relative imports in JS/TS
rule: >-
  In JS/TS workspaces, imports must use workspace package names (as defined in each package.json and exports) rather than relative paths crossing package boundaries.
severity: high
scope: file
examples:
  - snippet: "import x from \"../../other-pkg/index\""
    isCorrect: false
  - snippet: "import x from \"@acme/other-pkg\""
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
