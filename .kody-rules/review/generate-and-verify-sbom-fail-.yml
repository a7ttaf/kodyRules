title: Generate and verify SBOM; fail build on critical CVEs
rule: >-
  Produce an SBOM (e.g., SPDX/CycloneDX) during CI and block releases if SCA
  finds CVEs ≥ High severity or disallowed licenses.
severity: high
examples:
  - snippet: sca --fail-on-severity High
    isCorrect: true
  - snippet: sca --ignore-all
    isCorrect: false
