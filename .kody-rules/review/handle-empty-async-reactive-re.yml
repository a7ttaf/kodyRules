title: Handle empty async/reactive results with appropriate responses
rule: >-
  When using Optional/CompletableFuture/Publisher-like types, map empty values
  to a clear outcome (e.g., 404) rather than returning null.
severity: low
examples:
  - snippet: future.thenApply(x -> null)
    isCorrect: false
  - snippet: optional.map(this::ok).orElseGet(this::notFound)
    isCorrect: true
