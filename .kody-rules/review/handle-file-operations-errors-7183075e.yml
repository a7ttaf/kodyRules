title: Handle file operations errors
rule: >-
  Guard file IO with try/except; handle OSError and data parse errors with clear messages.
severity: high
scope: file
examples:
  - snippet: "open(path).read()"
    isCorrect: false
  - snippet: "with open(path) as f: ...;  # try/except around"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
