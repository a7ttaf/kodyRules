title: Handle Type Assertion Failures
rule: >-
  Use the 'comma, ok' idiom for type assertions to safely handle cases when the assertion fails. Only use a single-value type assertion (which panics on failure) if you are absolutely sure (by prior checks or program logic) that the interface holds the correct type.
severity: high
scope: file
examples:
  - snippet: "var x interface{} = getValue()\n// Assuming x should be a string, but not checking\ns := x.(string) // will panic if x isn't a string"
    isCorrect: false
  - snippet: "var x interface{} = getValue()\ns, ok := x.(string)\nif !ok {\n    return fmt.Errorf(\"unexpected type: %T\", x)\n}\n// use s safely as a string"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
