title: Immutable cache and Vary for precompressed files
rule: >-
  Serve precompressed .br/.gz variants when the client sends Accept-Encoding, set "Vary: Accept-Encoding", and apply immutable caching for hashed assets; keep HTML revalidatable.
severity: high
scope: file
examples:
  - snippet: "res.insert_header((\"Vary\",\"Accept-Encoding\"))"
    isCorrect: true
  - snippet: "Files::new(\"/assets\",\"./public\") // defaults"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
