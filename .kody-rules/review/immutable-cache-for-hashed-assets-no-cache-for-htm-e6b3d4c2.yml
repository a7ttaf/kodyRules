title: Immutable cache for hashed assets, no-cache for HTML
rule: >-
  In Express, use serve-static with setHeaders to apply "Cache-Control: public, max-age=31536000, immutable" for files matching /\.[0-9a-f]{8,}\./ and "Cache-Control: no-cache" for HTML. Also set correct Content-Type.
severity: high
scope: file
examples:
  - snippet: "res.setHeader('Cache-Control','public, max-age=31536000, immutable')"
    isCorrect: true
  - snippet: "app.use(express.static('public')) // no Cache-Control"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
