title: Implement retention policy and purge jobs for ePHI
rule: >-
  Changes that create new ePHI stores must also include retention configuration and a scheduled purge job aligned to policy (e.g., 6 years). Document tables/collections covered and add tests for TTL behavior.
severity: low
scope: pull-request
examples:
  - snippet: "CREATE TABLE phi_events (...); -- no ttl"
    isCorrect: false
  - snippet: "retention.yaml: { table: phi_events, ttl: 6y }\ncron: purge_phi_events @daily"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
