title: Improve field encapsulation with private visibility
rule: >-
  Use private fields with accessors; expose the narrowest visibility that satisfies usage.
severity: low
scope: file
examples:
  - snippet: "public int x;"
    isCorrect: false
  - snippet: "private int x;"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
