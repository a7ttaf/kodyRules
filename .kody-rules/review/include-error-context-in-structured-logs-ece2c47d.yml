title: Include error context in structured logs
rule: >-
  Error logs must include the operation name and relevant identifiers as structured fields, not just a message string.
severity: high
scope: file
examples:
  - snippet: "console.error(e)"
    isCorrect: false
  - snippet: "logger.error('op failed', { op, id, err })"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
