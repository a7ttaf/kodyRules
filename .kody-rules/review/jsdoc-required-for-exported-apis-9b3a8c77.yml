title: JSDoc required for exported APIs
rule: >-
  All exported JS/TS functions, classes, and public members must include JSDoc with a summary and @param/@returns; include @throws when applicable.
severity: high
scope: file
examples:
  - snippet: "/* Multiply two numbers. @param {number} x @param {number} y @returns {number} /\nexport const mul = (x, y) => x * y;"
    isCorrect: true
  - snippet: "export const mul = (x, y) => x * y;"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
