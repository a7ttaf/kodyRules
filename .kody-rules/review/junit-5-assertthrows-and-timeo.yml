title: 'JUnit 5: assertThrows and timeouts for slow paths'
rule: >-
  Use assertThrows for exception cases and annotate long-running tests with
  @Timeout to bound execution; use @TempDir for file I/O.
severity: low
examples:
  - snippet: assertThrows(IllegalArgumentException.class, () -> f())
    isCorrect: true
  - snippet: '@Test void x(){ f(); } // no asserts'
    isCorrect: false
