title: Keep a single lockfile at the repo root
rule: >-
  Permit exactly one lockfile at the monorepo root (pnpm-lock.yaml, yarn.lock,
  or package-lock.json). Forbid lockfiles inside workspace packages. Validate
  against PR changes and existing tree.
severity: high
examples:
  - snippet: packages/app/yarn.lock
    isCorrect: false
  - snippet: pnpm-lock.yaml
    isCorrect: true
