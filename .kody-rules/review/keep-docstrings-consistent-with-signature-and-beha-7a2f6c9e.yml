title: Keep docstrings consistent with signature and behavior
rule: >-
  Docstrings must match parameter names, optional defaults, return type, and raised exceptions; update the docstring in the same PR as any signature change.
severity: high
scope: file
examples:
  - snippet: "def foo(x: int, y: int = 0) -> int:\n \"\"\"Add x and y (default 0).\n\"\"\"\n return x + y"
    isCorrect: true
  - snippet: "def foo(x: int, y: int = 0) -> int:\n \"\"\"Add a and b.\n\"\"\"\n return x + y"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
