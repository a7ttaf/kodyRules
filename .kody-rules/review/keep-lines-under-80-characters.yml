title: Keep Lines Under 80 Characters for Readability
rule: >-
  Check if lines exceed 80 characters (excluding comments and docstrings). Long
  lines reduce readability. Recommend breaking lines or using line continuations
  for better formatting.
severity: low
examples:
  - snippet: result = [mapping_expr for value in iterable if condition(value)]
    isCorrect: false
  - snippet: |-
      result = [
          mapping_expr
          for value in iterable
          if condition(value)
      ]
    isCorrect: true
