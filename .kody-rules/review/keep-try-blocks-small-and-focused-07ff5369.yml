title: Keep `try` Blocks Small and Focused
rule: >-
  Detect `try` blocks that contain excessive code. Large `try` blocks make it harder to debug errors. Recommend narrowing the scope of the `try` block to only the necessary code.
severity: low
scope: file
examples:
  - snippet: "try:\n    x = 10\n    y = x / 0\n    print(y)\nexcept ZeroDivisionError:\n    print('Error')"
    isCorrect: false
  - snippet: "x = 10\ntry:\n    y = x / 0\nexcept ZeroDivisionError:\n    print('Error')"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
