title: Link an issue or ticket reference
rule: >-
  Reference at least one tracking ID (e.g., JIRA/GitHub issue) in the PR
  description using a consistent format (e.g., 'Refs: ABC-123').
severity: low
examples:
  - snippet: Implements new thing
    isCorrect: false
  - snippet: 'Refs: OPS-22; Closes: #4512'
    isCorrect: true
