title: Load PHI-related secrets from a secret manager, never from code
rule: >-
  Access tokens, HMAC salts, and KMS keys for PHI flows must come from a secret manager or encrypted credentials store; forbid committing secrets or .env files to the repo.
severity: high
scope: file
examples:
  - snippet: "API_KEY='abc123' # in repo"
    isCorrect: false
  - snippet: "Rails.application.credentials[:phi][:hmac_salt]"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
