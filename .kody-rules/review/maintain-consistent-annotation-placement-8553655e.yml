title: Maintain Consistent Annotation Placement
rule: >-
  Ensure that annotations are placed consistently before or after modifiers throughout the codebase.
severity: low
scope: file
examples:
  - snippet: "@Override public void someMethod() { ... }"
    isCorrect: false
  - snippet: "@Override\npublic void someMethod() { ... }"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
