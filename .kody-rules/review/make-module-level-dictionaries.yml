title: Make module-level dictionaries immutable
rule: >-
  Expose constant dicts as read-only via MappingProxyType (or frozen
  dataclasses) to prevent runtime mutation.
severity: low
examples:
  - snippet: 'CONST = {''a'': 1}; CONST[''b'']=2'
    isCorrect: false
  - snippet: 'CONST = MappingProxyType({''a'': 1})'
    isCorrect: true
