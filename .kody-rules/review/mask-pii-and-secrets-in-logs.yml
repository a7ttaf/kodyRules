title: Mask PII and secrets in logs
rule: >-
  Before emitting logs, detect and redact PII and secret patterns (emails,
  tokens, keys). Replace values with consistent hashes or tokens; never log full
  credentials.
severity: high
examples:
  - snippet: 'log.info({ email_hash: hash(email) })'
    isCorrect: true
  - snippet: log.info({ email })
    isCorrect: false
