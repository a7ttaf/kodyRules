title: Middleware only for light auth/rewrites
rule: >-
  Keep middleware fast and side-effect free (no DB writes). Narrow the matcher and skip static assets. Use Route Handlers for heavy logic.
severity: high
scope: file
examples:
  - snippet: "Heavy I/O inside middleware"
    isCorrect: false
  - snippet: "matcher that skips assets and health"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
