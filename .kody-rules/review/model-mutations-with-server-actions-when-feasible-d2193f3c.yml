title: Model mutations with Server Actions when feasible
rule: >-
  For simple form submissions from RSC, use server actions with schema validation and then revalidate paths/tags. Avoid client fetch for trivial mutations.
severity: low
scope: file
examples:
  - snippet: "Client-side fetch to create a simple item"
    isCorrect: false
  - snippet: "Server action + revalidatePath"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
