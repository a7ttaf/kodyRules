title: Move environment configuration to startup
rule: >-
  Load and validate environment/config once during startup; inject settings into modules instead of re-reading env.
severity: high
scope: file
examples:
  - snippet: "os.getenv('X') everywhere"
    isCorrect: false
  - snippet: "SETTINGS = load_env(); use SETTINGS"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
