title: Move large templates to external files
rule: >-
  Store long static templates/prompts in files and load them at runtime; avoid embedding huge multi-line strings in code.
severity: low
scope: file
examples:
  - snippet: "HTML = \"\"\"... 500 lines ...\"\"\""
    isCorrect: false
  - snippet: "HTML = Path('template.html').read_text()"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
