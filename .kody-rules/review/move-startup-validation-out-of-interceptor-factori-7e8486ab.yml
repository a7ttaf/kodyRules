title: Move startup validation out of interceptor factories
rule: >-
  Perform one-time configuration/dependency validation at process startup (init/bootstrap). Avoid doing it inside per-request middleware/interceptor factories.
severity: low
scope: file
examples:
  - snippet: "validate inside middleware factory on each wiring"
    isCorrect: false
  - snippet: "validate once at startup; construct middleware after"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
