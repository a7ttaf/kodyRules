title: mTLS for internal service-to-service traffic
rule: >-
  Configure Spring Boot to require client certificates for internal APIs (clientAuth=REQUIRE) and restrict CAs; log peer certificate subject in audit events.
severity: high
scope: file
examples:
  - snippet: "server.ssl.client-auth=REQUIRE"
    isCorrect: true
  - snippet: "server.ssl.client-auth=NONE"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
