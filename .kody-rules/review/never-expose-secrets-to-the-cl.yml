title: Never expose secrets to the client
rule: >-
  Read secrets (process.env.*) only in Server Components, Route Handlers, or
  server actions. Client Components must use ONLY NEXT_PUBLIC_* variables.
severity: high
examples:
  - snippet: process.env.DB_URL inside a Client Component
    isCorrect: false
  - snippet: process.env.DB_URL inside a Route Handler
    isCorrect: true
