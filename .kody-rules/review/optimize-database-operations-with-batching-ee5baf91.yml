title: Optimize database operations with batching
rule: Use executemany/bulk operations and commit in sensible batches for large writes.
severity: low
scope: file
examples:
  - snippet: "for r in rows: insert(r)"
    isCorrect: false
  - snippet: "executemany('INSERT ...', rows)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
