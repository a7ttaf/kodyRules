title: Pin exact versions with digests for base images
rule: >-
  Base images must be pinned to an exact version and content digest (@sha256) to guarantee reproducible builds and supply-chain integrity.
severity: high
scope: file
examples:
  - snippet: "FROM nginx:latest"
    isCorrect: false
  - snippet: "FROM nginx:1.25.5@sha256:abcd..."
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
