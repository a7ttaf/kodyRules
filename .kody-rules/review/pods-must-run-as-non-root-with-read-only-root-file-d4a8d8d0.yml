title: Pods must run as non-root with read-only root filesystem
rule: >-
  Set securityContext.runAsNonRoot=true, runAsUser!=0, and readOnlyRootFilesystem=true on pods/containers.
severity: critical
scope: file
examples:
  - snippet: "securityContext:\n runAsNonRoot: true\n runAsUser: 1000"
    isCorrect: true
  - snippet: "securityContext:\n runAsUser: 0"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
