title: Pods must run as non-root with read-only root filesystem
rule: >-
  Set securityContext.runAsNonRoot=true, runAsUser!=0, and
  readOnlyRootFilesystem=true on pods/containers.
severity: critical
examples:
  - snippet: |-
      securityContext:
       runAsNonRoot: true
       runAsUser: 1000
    isCorrect: true
  - snippet: |-
      securityContext:
       runAsUser: 0
    isCorrect: false
