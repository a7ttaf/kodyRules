title: Prefer Constructor Injection for Spring Components
rule: >-
  Ensure that constructor injection is used instead of field injection
  (`@Autowired` on fields) in Spring components for better testability.
severity: high
examples:
  - snippet: |-
      @Controller
      public class HelloWorld {

        @Autowired
        private String title = null; // Noncompliant

      }
    isCorrect: false
