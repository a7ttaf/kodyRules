title: Prefer Constructor Injection for Spring Components
rule: >-
  Ensure that constructor injection is used instead of field injection (`@Autowired` on fields) in Spring components for better testability.
severity: high
scope: file
examples:
  - snippet: "@Controller\npublic class HelloWorld {\n\n  @Autowired\n  private String title = null; // Noncompliant\n\n}"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
