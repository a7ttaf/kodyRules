title: Prefer dependency injection over manual factories
rule: >-
  Obtain collaborators via constructor injection (or a DI container) instead of new/service locators in business code.
severity: high
scope: file
examples:
  - snippet: "var repo = Factories.getRepo()"
    isCorrect: false
  - snippet: "new Handler(Repo repo)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
