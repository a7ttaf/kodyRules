title: Prefer f-strings for String Formatting
rule: >-
  Detect string formatting using `.format()` or `%`. These methods are less
  readable and slower than f-strings. Recommend converting string formatting to
  f-strings for better readability and performance.
severity: low
examples:
  - snippet: Hello, {}'.format(title)
    isCorrect: false
  - snippet: f'Hello, {title}'
    isCorrect: true
