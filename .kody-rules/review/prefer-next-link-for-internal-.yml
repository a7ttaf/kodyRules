title: Prefer next/link for internal navigation
rule: >-
  Use <Link> from 'next/link' for internal routes; reserve <a> only for external
  URLs or downloadable assets.
severity: low
examples:
  - snippet: <a href="/settings">Settings</a>
    isCorrect: false
  - snippet: <Link href="/settings">Settings</Link>
    isCorrect: true
