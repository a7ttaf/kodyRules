title: Prevent Filesystem Oracle Attacks
rule: >-
  Ensure that the application does not disclose file existence based on user input to prevent filesystem oracle attacks.
severity: critical
scope: file
examples:
  - snippet: "import java.io.File;\n\n@Controller\npublic class ExampleController\n{\n    static private String targetDirectory = \"/path/to/target/directory/\";\n\n    @GetMapping(value = \"/exists\")\n    public void delete(@RequestParam(\"filename\") String filename) throws IOException {\n\n        File file = new File(targetDirectory + filename);\n        if (!file.exists()) { // Noncompliant\n            throw new IOException(\"File does not exists in the target directory\");\n        }\n    }\n}"
    isCorrect: false
  - snippet: "import java.io.File;\n\n@Controller\npublic class ExampleController\n{\n    static private String targetDirectory = \"/path/to/target/directory/\";\n\n    @GetMapping(value = \"/exists\")\n    public void delete(@RequestParam(\"filename\") String filename) throws IOException {\n\n        File file = new File(targetDirectory + filename);\n        String canonicalDestinationPath = file.getCanonicalPath();\n\n        if (!canonicalDestinationPath.startsWith(targetDirectory)) {\n            throw new IOException(\"Entry is outside of the target directory\");\n        } else if (!file.exists()) {\n            throw new IOException(\"File does not exists in the target directory\");\n        }\n    }\n}"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
