title: Prevent Memory Allocation Vulnerabilities
rule: >-
  Check if memory allocation sizes are derived from untrusted input. Attackers may exploit this to crash the program or consume excessive resources. Recommend validating and limiting allocation sizes.
severity: high
scope: file
examples:
  - snippet: "def example():\n    limit = int(request.args.get('limit'))\n\n    data = '#' * limit  # Noncompliant"
    isCorrect: false
  - snippet: "def example():\n    limit = int(request.args.get('limit'))\n    restricted_limit = min(10, limit)\n\n    data = '#' * restricted_limit"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
