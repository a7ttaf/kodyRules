title: Prevent Server-Side Request Path Traversal Attacks
rule: >-
  Ensure that all user inputs related to file paths are validated and sanitized
  to prevent path traversal attacks.
severity: critical
examples:
  - snippet: |-
      @GetMapping("/user")
      public String getUser(@RequestParam(value = "id") String id) {
          URL url = new URL("http://example.com/api/user/" + id); // Noncompliant
          HttpURLConnection connection = (HttpURLConnection) url.openConnection();
      }
    isCorrect: false
  - snippet: |-
      import java.net.URLEncoder;
      import java.nio.charset.StandardCharsets;

      @GetMapping("/user")
      public String getUser(@RequestParam(value = "id") String id) {
          String encodedId = URLEncoder.encode(id, StandardCharsets.UTF_8);
          URL url = new URL("http://example.com/api/user/?id=" + encodedId);
          HttpURLConnection connection = (HttpURLConnection) url.openConnection();
      }
    isCorrect: true
