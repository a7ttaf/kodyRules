title: PRs adding new PII must declare lawful basis and DPIA flag
rule: >-
  When a PR introduces new PII fields or processing, the PR body must include
  legal_basis: (e.g., consent, contract) and dpia: (yes/no with link). CI should
  fail if missing.
severity: high
examples:
  - snippet: 'legal_basis: consent\ndpia: yes\ndpia_link: https://…'
    isCorrect: true
  - snippet: This PR adds cpf column
    isCorrect: false
