title: Pulumi Go: protect critical resources from destroy
rule: >-
  For stateful/critical infra (state buckets, databases), create resources with pulumi.Protect(true) to block accidental destroy.
severity: high
scope: file
examples:
  - snippet: "pulumi.Protect(true)"
    isCorrect: true
  - snippet: "// no Protect option"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
