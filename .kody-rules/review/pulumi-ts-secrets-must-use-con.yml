title: 'Pulumi TS: secrets must use Config.requireSecret'
rule: >-
  In Pulumi TypeScript programs, load sensitive values with new
  Config().requireSecret and pass as Secret<T>, never plain strings.
severity: critical
examples:
  - snippet: const s = new pulumi.Config().requireSecret("dbPassword");
    isCorrect: true
  - snippet: const s = process.env.DB_PASSWORD;
    isCorrect: false
