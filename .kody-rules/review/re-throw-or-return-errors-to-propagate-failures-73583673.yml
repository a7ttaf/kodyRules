title: Re-throw or return errors to propagate failures
rule: >-
  Never swallow exceptions in catch blocks; either rethrow or return an explicit error result.
severity: high
scope: file
examples:
  - snippet: "catch(e) { }"
    isCorrect: false
  - snippet: "catch(e) { logger.error(e); throw e }"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
