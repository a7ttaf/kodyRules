title: React children should not be passed as props
rule: >-
  Check if React children are passed as regular props instead of being nested inside components. Passing them incorrectly can cause conflicts and reduce clarity.
severity: high
scope: file
examples:
  - snippet: "<div children='Children' />\n<Foo children={<Bar />} />\n\nReact.createElement(\"div\", { children: 'Children' })"
    isCorrect: false
  - snippet: "<div>Children</div>\n<Foo><Bar /></Foo>\n\nReact.createElement(\"div\", {}, 'Children');"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
