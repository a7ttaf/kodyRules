title: Redact PII with log wrappers
rule: >-
  Wrap logger to filter emails and tokens using regex before logging; include trace_id in every entry.
severity: low
scope: file
examples:
  - snippet: "logger.Info(\"export\", zap.String(\"trace_id\", tid))"
    isCorrect: true
  - snippet: "log.Println(email)"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
