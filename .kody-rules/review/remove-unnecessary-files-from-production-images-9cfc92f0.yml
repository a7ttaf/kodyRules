title: Remove unnecessary files from production images
rule: >-
  Ship only runtime artifacts (binaries, compiled assets, minimal configs). Exclude tests, sources, docs, and dev tooling.
severity: low
scope: file
examples:
  - snippet: "COPY . /srv"
    isCorrect: false
  - snippet: "COPY --from=build /out /srv && prune dev deps"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
