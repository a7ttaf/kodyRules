title: Remove Unnecessary Trailing Whitespace
rule: >-
  Detect lines with trailing whitespace. Trailing spaces add unnecessary noise to version control diffs. Recommend removing them to keep the codebase clean.
severity: low
scope: file
examples:
  - snippet: "x = 42"
    isCorrect: false
  - snippet: "x = 42"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
