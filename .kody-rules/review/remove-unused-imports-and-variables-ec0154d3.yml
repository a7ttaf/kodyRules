title: Remove unused imports and variables
rule: >-
  Delete imports and locals that are not referenced; prefer tooling (ruff/flake8/mypy) to enforce.
severity: low
scope: file
examples:
  - snippet: "from math import sqrt  # unused"
    isCorrect: false
  - snippet: "from math import sqrt; print(sqrt(4))"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
