title: Replace hardcoded paths with configuration
rule: >-
  Derive paths/URLs from configuration or environment variables, not string literals in code.
severity: low
scope: file
examples:
  - snippet: "BASE_URL = 'https://prod.example.com'"
    isCorrect: false
  - snippet: "BASE_URL = os.environ['BASE_URL']"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
