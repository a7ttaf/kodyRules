title: Replace print statements with logging framework
rule: >-
  Use the standard logging module (or your app's logger) instead of print() in committed code.
severity: low
scope: file
examples:
  - snippet: "print('error:', e)"
    isCorrect: false
  - snippet: "logger.exception('operation failed')"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
