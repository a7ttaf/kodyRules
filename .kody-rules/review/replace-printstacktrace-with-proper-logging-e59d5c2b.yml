title: Replace printStackTrace with proper logging
rule: >-
  Do not use printStackTrace/System.err; log via a structured logger with context and level.
severity: high
scope: file
examples:
  - snippet: "e.printStackTrace()"
    isCorrect: false
  - snippet: "logger.warn(\"op failed\", e)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
