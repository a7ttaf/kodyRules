title: Require explicit consent before processing sensitive data
rule: >-
  Before handling sensitive personal data (e.g., health, biometric), verify a valid consent record and attach its ID to the processing context. Provide a path to revoke consent and stop further processing.
severity: critical
scope: file
examples:
  - snippet: "fetch('/health-metrics',{ headers:{'x-consent-id': cid }})"
    isCorrect: true
  - snippet: "fetch('/health-metrics') // missing consent"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
