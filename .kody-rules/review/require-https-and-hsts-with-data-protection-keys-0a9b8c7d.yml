title: Require HTTPS and HSTS with Data Protection keys
rule: >-
  Use app.UseHsts(); app.UseHttpsRedirection(); store DataProtection keys in Azure Key Vault or KMS with rotation.
severity: high
scope: file
examples:
  - snippet: "app.UseHsts();"
    isCorrect: true
  - snippet: "app.UseDeveloperExceptionPage(); // in production"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
