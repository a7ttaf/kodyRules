title: Require TLSv1.2+ and secure cookies
rule: >-
  Configure http.Server with tls.Config{MinVersion: tls.VersionTLS12} and set cookies with Secure, HttpOnly, SameSite.
severity: high
scope: file
examples:
  - snippet: "cfg := &tls.Config{MinVersion: tls.VersionTLS12}"
    isCorrect: true
  - snippet: "cfg := &tls.Config{MinVersion: 0}"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
