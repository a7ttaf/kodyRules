title: Retention: set TTLs for caches and temp stores with PII
rule: >-
  All cache entries containing PII must set an explicit TTL aligned to the retention policy (e.g., 24h). No indefinite storage of personal data in Redis or in-memory caches.
severity: high
scope: file
examples:
  - snippet: "rdb.Set(ctx, \"user:pii\", payload, 24*time.Hour)"
    isCorrect: true
  - snippet: "rdb.Set(ctx, \"user:pii\", payload, 0)"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
