title: Return explicit HTTP responses from API methods
rule: >-
  API endpoints should return an explicit status code and minimal error body on failures; avoid 200 with error payload.
severity: high
scope: file
examples:
  - snippet: "return ok(Map.of(\"error\",\"x\"))"
    isCorrect: false
  - snippet: "return response(400, Map.of(\"error\",\"invalid_request\"))"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
