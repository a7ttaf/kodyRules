title: Return proper HTTP status codes for errors
rule: >-
  Handlers must return non-2xx status codes for error outcomes and include a
  minimal error body that does not leak sensitive details.
severity: high
examples:
  - snippet: 'res.status(200).json({ error: ''x'' })'
    isCorrect: false
  - snippet: 'res.status(500).json({ error: ''internal_error'' })'
    isCorrect: true
