title: Rust async tests: use #[tokio::test] and avoid unwrap()
rule: >-
  For async code, annotate with #[tokio::test] (or async runtime in use) and return Result from tests; never use unwrap()/expect() in assertions.
severity: low
scope: file
examples:
  - snippet: "#[tokio::test]\nasync fn x()->Result<(),Box<dyn std::error::Error>>{ Ok(()) }"
    isCorrect: true
  - snippet: "assert_eq!(some_result.unwrap(), 3)"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
