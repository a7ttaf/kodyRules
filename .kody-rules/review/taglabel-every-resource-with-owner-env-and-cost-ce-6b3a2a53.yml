title: Tag/label every resource with owner, env, and cost-center
rule: >-
  All Terraform/Kubernetes resources must include standard tags/labels: owner, env, cost-center (and application if available).
severity: high
scope: file
examples:
  - snippet: "metadata:\n labels:\n owner: platform-team\n env: prod\n cost-center: cc-1234"
    isCorrect: true
  - snippet: "metadata:\n labels: {}"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
