title: "this" should not be used in functional components

rule: >-
  Ensure that 'this' is not used in functional components. Functional components do not have a 'this' context. Use props and destructuring for data access instead.
severity: high
scope: file
examples:
  - snippet: "function MyComponent(props){\n    const foo = this.props.bar; // Noncompliant: remove 'this'\n    return (\n        <div>{foo}</div>\n    );\n}"
    isCorrect: false
  - snippet: "function MyComponent({bar}){\n    const foo = bar;\n    return (\n        <div>{foo}</div>\n    );\n}"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
