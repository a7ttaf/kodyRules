title: Use a secrets manager and 90-day rotation policy
rule: >-
  All credentials (API keys, DB passwords, tokens) must be stored in a secrets manager with automatic rotation ≤ 90 days; forbid hardcoded or .env-committed secrets via CI checks.
severity: critical
scope: file
examples:
  - snippet: "secrets.get(\"kafka/password\")"
    isCorrect: true
  - snippet: "const PWD = \"SuperSecret123!\""
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
