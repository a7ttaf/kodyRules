title: Use Absolute Imports Instead of Relative Imports
rule: >-
  Detect relative imports (e.g., `from .module import x`). Relative imports can break if the project structure changes. Recommend using absolute imports (`from package.module import x`) for better clarity and maintainability.
severity: low
scope: file
examples:
  - snippet: "from .module import MyClass"
    isCorrect: false
  - snippet: "from project.module import MyClass"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
