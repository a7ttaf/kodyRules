title: Use aliased imports to avoid naming collisions
rule: >-
  Alias imports when names overlap with locals or other modules; keep clear, unique identifiers.
severity: low
scope: file
examples:
  - snippet: "import time; time = 3"
    isCorrect: false
  - snippet: "import time as time_module"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
