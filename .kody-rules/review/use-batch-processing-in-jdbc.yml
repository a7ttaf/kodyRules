title: Use Batch Processing in JDBC
rule: >-
  Ensure that batch processing is used instead of executing individual SQL
  statements inside loops for better database efficiency.
severity: high
examples:
  - snippet: |-
      public void execute(Connection connection) {
        try {
          Statement statement = connection.createStatement();

          for (int i = 0; i < 10; i++) {
            statement.execute("INSERT INTO myTable (column1, column2) VALUES (" + i + ", 'value" + i + "')"); // Noncompliant
          }

          statement.close();
          connection.close();
        } catch (SQLException e) {
          e.printStackTrace();
        }
      }
    isCorrect: false
  - snippet: |-
      public void execute(Connection connection) {
        try {
          Statement statement = connection.createStatement();

          for (int i = 0; i < 10; i++) {
            statement.addBatch("INSERT INTO myTable (column1, column2) VALUES (" + i + ", 'value" + i + "')"); // Compliant
          }
          statement.executeBatch();

          statement.close();
          connection.close();
        } catch (SQLException e) {
          e.printStackTrace();
        }
      }
    isCorrect: true
