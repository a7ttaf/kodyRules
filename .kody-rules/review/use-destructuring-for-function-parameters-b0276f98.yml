title: Use destructuring for function parameters
rule: >-
  Ensure that destructuring is used in function parameters where applicable. This improves readability by clearly showing accessed properties and default values.
severity: low
scope: file
examples:
  - snippet: "function configure(options: { key?: string, value?: number }) {\n  const key = options.key || \"defaultKey\";\n  const value = options.value || 0;\n}"
    isCorrect: false
  - snippet: "function configure({ key = \"defaultKey\", value = 0 }: { key?: string; value?: number }) {}"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
