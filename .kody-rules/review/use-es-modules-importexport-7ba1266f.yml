title: Use ES Modules (`import`/`export`)
rule: >-
  Always use ES Modules (`import` and `export`) for managing dependencies and organizing code in Vue applications. Avoid non-standard module systems or global namespace pollution.
severity: low
scope: file
examples:
  - snippet: "// utils.js\nmodule.exports = { format() {} };\n// component.js\nvar utils = require('./utils');"
    isCorrect: false
  - snippet: "// utils.js\nexport function format() {}\n// component.js\nimport { format } from './utils';"
    isCorrect: true
  - snippet: "// api.js\nconst api = { fetch() {} };\nexport default api;\n// component.js\nimport myApi from './api';"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
