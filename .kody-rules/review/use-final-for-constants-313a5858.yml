title: Use `final` for Constants
rule: >-
  Ensure that constants are declared with the `final` keyword to prevent modification.
severity: high
scope: file
examples:
  - snippet: "static int MAX_VALUE = 100;"
    isCorrect: false
  - snippet: "static final int MAX_VALUE = 100;"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
