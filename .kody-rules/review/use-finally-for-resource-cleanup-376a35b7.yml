title: Use `finally` for Resource Cleanup
rule: >-
  Detect code where resources (files, sockets, etc.) are not closed in a `finally` block. Using `finally` ensures that resources are released, even if an exception is raised.
severity: high
scope: file
examples:
  - snippet: "file = open(\"test.txt\")\ndata = file.read()"
    isCorrect: false
  - snippet: "try:\n    file = open(\"test.txt\")\n    data = file.read()\nfinally:\n    file.close()\n"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
