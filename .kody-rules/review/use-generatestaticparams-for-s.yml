title: Use generateStaticParams for SSG on dynamic routes
rule: >-
  When statically prebuilding dynamic segments, implement generateStaticParams
  and validate params; fall back to notFound() for invalid slugs.
severity: low
examples:
  - snippet: Missing generateStaticParams for static content
    isCorrect: false
  - snippet: generateStaticParams + notFound()
    isCorrect: true
