title: Use item docs (///) and module/crate docs (!//) with examples
rule: >-
  Document public items with /// and modules/crates with //!; include minimal runnable examples that pass doctests where applicable.
severity: low
scope: file
examples:
  - snippet: "//! Utilities for math operations."
    isCorrect: true
  - snippet: "// Utilities for math operations."
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
