title: Use Java Records for Immutable Data Structures
rule: >-
  Ensure that Java records are used for immutable data structures instead of manually implementing immutable classes.
severity: high
scope: file
examples:
  - snippet: "final class Person { // Noncompliant\n  private final String name;\n  private final int age;\n\n  public Person(String name, int age) {\n    this.name = name;\n    this.age = age;\n  }\n\n  public String getName() {...}\n\n  public int getAge() {...}\n\n  @Override\n  public boolean equals(Object o) {...}\n\n  @Override\n  public int hashCode() {...}\n\n  @Override\n  public String toString() {...}\n}"
    isCorrect: false
  - snippet: "record Person(String name, int age) { }"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
