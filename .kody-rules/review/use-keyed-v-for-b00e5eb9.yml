title: Use keyed `v-for`
rule: >-
  `key` with `v-for` is *always* required on components to maintain internal component state down the subtree. Even for elements, it's good practice for predictable behavior like object constancy in animations.
severity: high
scope: file
examples:
  - snippet: "<ul>\n  <li v-for=\"todo in todos\">\n    {{ todo.text }}\n  </li>\n</ul>"
    isCorrect: false
  - snippet: "<ul>\n  <li\n    v-for=\"todo in todos\"\n    :key=\"todo.id\"\n  >\n    {{ todo.text }}\n  </li>\n</ul>"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
