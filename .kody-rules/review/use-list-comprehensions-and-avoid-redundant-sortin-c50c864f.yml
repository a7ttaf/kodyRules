title: Use list comprehensions and avoid redundant sorting
rule: >-
  Prefer comprehensions over map/filter chains and avoid double-sorting or sorting inside loops.
severity: low
scope: file
examples:
  - snippet: "sorted(sorted(xs))"
    isCorrect: false
  - snippet: "xs = sorted(xs, key=key)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
