title: Use named constants for magic values
rule: Replace numeric/string literals with named constants to document meaning.
severity: low
scope: file
examples:
  - snippet: "if (retries > 3)"
    isCorrect: false
  - snippet: "if (retries > MAX_RETRIES)"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
