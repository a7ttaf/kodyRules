title: Use next/font for fonts (no <link> to external CDNs)
rule: >-
  Load fonts via next/font (google or local) and apply on html/body; avoid runtime <link> to fonts that cause FOUT/CLS.
severity: low
scope: file
examples:
  - snippet: "<link rel=\"stylesheet\" href=\"...google fonts...\">"
    isCorrect: false
  - snippet: "Inter({ subsets:['latin'] }) + className"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
