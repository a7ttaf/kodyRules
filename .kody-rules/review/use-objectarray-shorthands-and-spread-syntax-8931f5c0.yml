title: Use object/array shorthands and spread syntax
rule: >-
  Utilize object method shorthands, property value shorthands, and computed property names when defining objects (e.g., in `data`, `computed`, `methods`). Prefer object spread syntax (`...`) over `Object.assign` for shallow copies or merging objects.
severity: low
scope: file
examples:
  - snippet: "data: function() { return {}; }"
    isCorrect: false
  - snippet: "data() { return {}; }"
    isCorrect: true
  - snippet: "const name = 'Comp';\nexport default { name: name };"
    isCorrect: false
  - snippet: "const name = 'Comp';\nexport default { name };"
    isCorrect: true
  - snippet: "const newArr = oldArr.concat(newItem);"
    isCorrect: false
  - snippet: "const newArr = [...oldArr, newItem]; // Good: Array spread"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
