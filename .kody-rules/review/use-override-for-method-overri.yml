title: Use @Override for Method Overrides
rule: Ensure that all overridden methods explicitly use the `@Override` annotation.
severity: low
examples:
  - snippet: |-
      public void equals(Object obj) {
          // Incorrect override
      }
    isCorrect: false
  - snippet: |-
      @Override
      public void equals(Object obj) {
          // Correct override
      }
    isCorrect: true
