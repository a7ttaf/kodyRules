title: Use Promise.allSettled for batch operations with partial failures
rule: >-
  For many independent tasks, prefer Promise.allSettled and handle per-item results.
severity: low
scope: file
examples:
  - snippet: "await Promise.all([...])"
    isCorrect: false
  - snippet: "await Promise.allSettled([...])"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
