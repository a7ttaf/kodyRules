title: Use Secure Password Hashing Functions
rule: >-
  Do not use weak or generic hash algorithms (like MD5 or SHA1) for storing passwords. Use built‐in functions like password_hash() (with BCRYPT or Argon2) and password_verify(), which handle salting and secure algorithms automatically.
severity: high
scope: file
examples:
  - snippet: "<?php\n$password = $_POST['senha'];\n$hash = md5($password);\n// store $hash in database\n?>"
    isCorrect: false
  - snippet: "<?php\n$password = $_POST['senha'];\n$hash = password_hash($password, PASSWORD_DEFAULT);\n// store $hash in database\n?>"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
