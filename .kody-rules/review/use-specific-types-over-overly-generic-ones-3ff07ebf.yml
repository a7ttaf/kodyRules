title: Use specific types over overly generic ones
rule: >-
  Prefer precise types (long, BigDecimal, LocalDate) over Number/Object when the domain is known.
severity: low
scope: file
examples:
  - snippet: "Object payload"
    isCorrect: false
  - snippet: "Map<String, Object> -> record/DTO"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
