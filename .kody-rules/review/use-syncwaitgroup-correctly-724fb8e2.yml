title: Use sync.WaitGroup Correctly
rule: >-
  When using a WaitGroup to synchronize goroutines, call Add() before launching each goroutine and ensure each goroutine calls Done() exactly once. Finally, call Wait() to block until all goroutines have called Done(). Misordering Add/Done or mismatched calls will cause issues.
severity: high
scope: file
examples:
  - snippet: "var wg sync.WaitGroup\n\ngo func() {\n    // forgot wg.Add(1)\n    defer wg.Done() // will panic because counter was 0\n    doWork()\n}()\nwg.Wait()"
    isCorrect: false
  - snippet: "var wg sync.WaitGroup\n\nwg.Add(1)\ngo func() {\n    defer wg.Done()\n    doWork()\n}()\nwg.Wait()"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
