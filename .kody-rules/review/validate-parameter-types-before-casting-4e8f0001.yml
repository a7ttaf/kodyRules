title: Validate parameter types before casting
rule: >-
  Use instanceof/pattern matching and guard before casts; avoid ClassCastException.
severity: low
scope: file
examples:
  - snippet: "(List<String>) obj"
    isCorrect: false
  - snippet: "if (obj instanceof List<?> list) { /* ... */ }"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
