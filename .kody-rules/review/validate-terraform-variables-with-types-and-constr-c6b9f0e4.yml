title: Validate Terraform variables with types and constraints
rule: >-
  All variables must declare a type, default (when sensible), and validation blocks; mark sensitive inputs with sensitive=true.
severity: low
scope: file
examples:
  - snippet: "variable \"db_password\" { type = string, sensitive = true }"
    isCorrect: true
  - snippet: "variable \"db_password\" {}"
    isCorrect: false
inheritance:
  inheritable: true
  exclude: []
  include: []
