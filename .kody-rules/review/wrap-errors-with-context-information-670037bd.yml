title: Wrap Errors with Context Information
rule: >-
  When returning an error from a function, include contextual information. Use `fmt.Errorf` with `%w` (or similar error wrapping) to add a message while preserving the original error.
severity: low
scope: file
examples:
  - snippet: "if err != nil {\n    return errors.New(\"operation failed\") // loses original error context\n}"
    isCorrect: false
  - snippet: "if err != nil {\n    return fmt.Errorf(\"operation failed: %w\", err) // wraps original error\n}"
    isCorrect: true
inheritance:
  inheritable: true
  exclude: []
  include: []
